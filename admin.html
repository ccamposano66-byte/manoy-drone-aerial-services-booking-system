<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>
Manoy Drone Aerial Services - Admin Dashboard
</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
color:#222;
}

/* =========================
LOGIN
========================= */

.login-page{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff7a00,#ff9d2e);
padding:20px;
}

.login-box{
background:white;
width:100%;
max-width:420px;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.login-box h1{
text-align:center;
font-size:24px;
margin-bottom:8px;
}

.login-box p{
text-align:center;
color:#666;
margin-bottom:25px;
}

.login-box input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

.login-box button{
width:100%;
padding:14px;
background:#ff7a00;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.login-box button:hover{
background:#e66d00;
}

.login-error{
display:none;
margin-top:15px;
padding:12px;
background:#ffe5e5;
color:#a00000;
border-radius:8px;
font-size:14px;
}

/* =========================
DASHBOARD
========================= */

.dashboard{
display:none;
}

.topbar{
background:#ff7a00;
color:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
}

.topbar h1{
font-size:22px;
}

.logout-btn{
background:white;
color:#ff7a00;
border:none;
padding:10px 16px;
border-radius:7px;
font-weight:bold;
cursor:pointer;
}

.dashboard-container{
max-width:1400px;
margin:auto;
padding:25px;
}

/* =========================
STATISTICS
========================= */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.stat-card h3{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.stat-card strong{
font-size:28px;
}

/* =========================
CONTROLS
========================= */

.controls{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.controls input,
.controls select{
padding:12px;
border:1px solid #ccc;
border-radius:7px;
font-size:14px;
}

.controls input{
flex:1;
min-width:250px;
}

/* =========================
BOOKING CARD
========================= */

.booking-card{
background:white;
border-radius:12px;
margin-bottom:18px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.booking-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
border-bottom:1px solid #eee;
padding-bottom:15px;
margin-bottom:15px;
}

.booking-reference{
font-size:20px;
font-weight:bold;
color:#ff7a00;
}

.booking-date{
color:#666;
font-size:13px;
margin-top:5px;
}

.booking-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.info-box{
background:#f8f8f8;
padding:12px;
border-radius:8px;
}

.info-box strong{
display:block;
font-size:12px;
color:#777;
margin-bottom:5px;
}

.info-box span{
font-size:14px;
word-break:break-word;
}

.services{
margin-top:15px;
padding:15px;
background:#fff7ef;
border-left:4px solid #ff7a00;
border-radius:7px;
}

.services strong{
display:block;
margin-bottom:5px;
}

.status-area{
margin-top:18px;
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.status-area select{
padding:10px;
border:1px solid #ccc;
border-radius:7px;
}

.update-btn{
padding:10px 15px;
background:#ff7a00;
color:white;
border:none;
border-radius:7px;
cursor:pointer;
font-weight:bold;
}

.update-btn:hover{
background:#e66d00;
}

.update-btn:disabled{
background:#999;
cursor:not-allowed;
}

/* =========================
STATUS BADGE
========================= */

.status-badge{
display:inline-block;
padding:7px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-top:10px;
}

.status-pending{
background:#fff3cd;
color:#856404;
}

.status-confirmed{
background:#d4edda;
color:#155724;
}

.status-completed{
background:#cce5ff;
color:#004085;
}

.status-cancelled{
background:#f8d7da;
color:#721c24;
}

/* =========================
NOTIFICATION
========================= */

.notification{
display:none;
position:fixed;
top:20px;
right:20px;
z-index:9999;
max-width:400px;
padding:18px 20px;
background:#155724;
color:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.25);
font-weight:bold;
}

.notification.error{
background:#a00000;
}

/* =========================
EMPTY / LOADING
========================= */

.empty{
text-align:center;
background:white;
padding:40px;
border-radius:12px;
color:#777;
}

.loading{
text-align:center;
padding:30px;
color:#777;
}

/* =========================
MOBILE
========================= */

@media(max-width:900px){

.stats{
grid-template-columns:repeat(2,1fr);
}

.booking-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.topbar{
flex-direction:column;
text-align:center;
}

.stats{
grid-template-columns:1fr 1fr;
}

.booking-grid{
grid-template-columns:1fr;
}

.dashboard-container{
padding:15px;
}

}

</style>

</head>

<body>


<!-- =========================
LOGIN PAGE
========================= -->

<div
class="login-page"
id="loginPage"
>

<div class="login-box">

<h1>
Manoy Drone Aerial Services
</h1>

<p>
Admin Dashboard
</p>

<input
type="email"
id="adminEmail"
placeholder="Admin Email"
>

<input
type="password"
id="adminPassword"
placeholder="Password"
>

<button
id="loginButton"
>
Admin Login
</button>

<div
class="login-error"
id="loginError"
></div>

</div>

</div>


<!-- =========================
DASHBOARD
========================= -->

<div
class="dashboard"
id="dashboard"
>

<div class="topbar">

<h1>
Manoy Drone Aerial Services
<br>
Admin Dashboard
</h1>

<button
class="logout-btn"
id="logoutButton"
>
Logout
</button>

</div>


<div class="dashboard-container">


<!-- =========================
STATISTICS
========================= -->

<div class="stats">

<div class="stat-card">

<h3>
Total Bookings
</h3>

<strong id="totalBookings">
0
</strong>

</div>


<div class="stat-card">

<h3>
Pending Verification
</h3>

<strong id="pendingBookings">
0
</strong>

</div>


<div class="stat-card">

<h3>
Confirmed
</h3>

<strong id="confirmedBookings">
0
</strong>

</div>


<div class="stat-card">

<h3>
Completed
</h3>

<strong id="completedBookings">
0
</strong>

</div>

</div>


<!-- =========================
SEARCH / FILTER
========================= -->

<div class="controls">

<input
type="text"
id="searchInput"
placeholder="Search booking reference, client, company..."
>

<select
id="statusFilter"
>

<option value="All">
All Status
</option>

<option value="Pending Verification">
Pending Verification
</option>

<option value="Confirmed">
Confirmed
</option>

<option value="Completed">
Completed
</option>

<option value="Cancelled">
Cancelled
</option>

</select>

</div>


<!-- =========================
BOOKINGS
========================= -->

<div
id="bookingsContainer"
>

<div class="loading">
Loading bookings...
</div>

</div>


</div>

</div>


<!-- =========================
NOTIFICATION
========================= -->

<div
id="notification"
class="notification"
></div>


<!-- =========================
FIREBASE
========================= -->

<script type="module">


import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";


import {

getAuth,

signInWithEmailAndPassword,

onAuthStateChanged,

signOut

}

from

"https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";


import {

getFirestore,

collection,

getDocs,

doc,

updateDoc,

query,

orderBy

}

from

"https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";



/*
========================================
FIREBASE CONFIG
========================================
*/

const firebaseConfig = {

apiKey:
"AIzaSyDKX2ZsfE8VRlwL38wjzBF-immeyh5CvwQ",

authDomain:
"manoy-drone-booking-system.firebaseapp.com",

projectId:
"manoy-drone-booking-system",

storageBucket:
"manoy-drone-booking-system.firebasestorage.app",

messagingSenderId:
"1046234143737",

appId:
"1:1046234143737:web:5642929f7b189e0a8fbb28",

measurementId:
"G-BMVTT7JNLM"

};



/*
========================================
GOOGLE APPS SCRIPT WEB APP
========================================
*/

const APPS_SCRIPT_URL =

"https://script.google.com/macros/s/AKfycbyy8WrtnUQaAvdqN1VB2nDl4tEN3fhjoLmx-Qg0GTjxI1UGpGIbgyqh_D9QQz4dZ0Kw/exec";



/*
========================================
INITIALIZE FIREBASE
========================================
*/

const app =
initializeApp(
firebaseConfig
);

const auth =
getAuth(app);

const db =
getFirestore(app);



/*
========================================
ELEMENTS
========================================
*/

const loginPage =
document.getElementById(
"loginPage"
);

const dashboard =
document.getElementById(
"dashboard"
);

const loginButton =
document.getElementById(
"loginButton"
);

const logoutButton =
document.getElementById(
"logoutButton"
);

const loginError =
document.getElementById(
"loginError"
);

const bookingsContainer =
document.getElementById(
"bookingsContainer"
);

const searchInput =
document.getElementById(
"searchInput"
);

const statusFilter =
document.getElementById(
"statusFilter"
);

const notification =
document.getElementById(
"notification"
);


let allBookings = [];



/*
========================================
SHOW NOTIFICATION
========================================
*/

function showNotification(
message,
isError = false
){

notification.textContent =
message;

notification.classList.toggle(
"error",
isError
);

notification.style.display =
"block";

setTimeout(
function(){

notification.style.display =
"none";

},
5000
);

}



/*
========================================
LOGIN
========================================
*/

loginButton.addEventListener(

"click",

async function(){

const email =

document
.getElementById(
"adminEmail"
)
.value
.trim();


const password =

document
.getElementById(
"adminPassword"
)
.value;


loginError.style.display =
"none";


if(
!email ||
!password
){

loginError.textContent =
"Please enter your email and password.";

loginError.style.display =
"block";

return;

}


try{

loginButton.disabled =
true;

loginButton.textContent =
"Logging in...";


await signInWithEmailAndPassword(

auth,

email,

password

);


}catch(error){

console.error(
error
);

loginError.textContent =
error.message;

loginError.style.display =
"block";

loginButton.disabled =
false;

loginButton.textContent =
"Admin Login";

}

}

);



/*
========================================
LOGOUT
========================================
*/

logoutButton.addEventListener(

"click",

async function(){

await signOut(
auth
);

}

);



/*
========================================
AUTH STATE
========================================
*/

onAuthStateChanged(

auth,

function(user){

if(user){

loginPage.style.display =
"none";

dashboard.style.display =
"block";

loadBookings();

}else{

loginPage.style.display =
"flex";

dashboard.style.display =
"none";

}

}

);



/*
========================================
LOAD BOOKINGS
========================================
*/

async function loadBookings(){

bookingsContainer.innerHTML =

'<div class="loading">Loading bookings...</div>';


try{

const bookingsQuery =

query(

collection(
db,
"bookings"
),

orderBy(
"createdAt",
"desc"
)

);


const snapshot =

await getDocs(
bookingsQuery
);


allBookings = [];


snapshot.forEach(

function(
documentSnapshot
){

allBookings.push({

id:
documentSnapshot.id,

...documentSnapshot.data()

});

}

);


updateStatistics();

displayBookings(
allBookings
);


}catch(error){

console.error(
error
);

bookingsContainer.innerHTML =

'<div class="empty">' +

'Error loading bookings:<br><br>' +

error.message +

'</div>';

}

}



/*
========================================
STATISTICS
========================================
*/

function updateStatistics(){

document
.getElementById(
"totalBookings"
)
.textContent =
allBookings.length;


document
.getElementById(
"pendingBookings"
)
.textContent =

allBookings.filter(

function(item){

return item.status ===
"Pending Verification";

}

).length;


document
.getElementById(
"confirmedBookings"
)
.textContent =

allBookings.filter(

function(item){

return item.status ===
"Confirmed";

}

).length;


document
.getElementById(
"completedBookings"
)
.textContent =

allBookings.filter(

function(item){

return item.status ===
"Completed";

}

).length;

}



/*
========================================
DISPLAY BOOKINGS
========================================
*/

function displayBookings(
bookings
){

const search =

searchInput
.value
.toLowerCase()
.trim();


const filter =

statusFilter
.value;


const filtered =

bookings.filter(

function(booking){

const matchesSearch =

String(
booking.bookingReference ||
""
)
.toLowerCase()
.includes(search)

||

String(
booking.clientName ||
""
)
.toLowerCase()
.includes(search)

||

String(
booking.company ||
""
)
.toLowerCase()
.includes(search);


const matchesStatus =

filter === "All"

||

booking.status ===
filter;


return(

matchesSearch &&

matchesStatus

);

}

);


if(
filtered.length === 0
){

bookingsContainer.innerHTML =

'<div class="empty">' +

'No bookings found.' +

'</div>';

return;

}


bookingsContainer.innerHTML =
"";


filtered.forEach(

function(booking){

const card =

document.createElement(
"div"
);

card.className =
"booking-card";


const services =

Array.isArray(
booking.services
)

?

booking.services.join(
", "
)

:

"Not specified";


let createdAt =
"Not available";


if(
booking.createdAt
){

try{

if(
typeof booking.createdAt.toDate ===
"function"
){

createdAt =

booking.createdAt
.toDate()
.toLocaleString();

}else{

createdAt =

new Date(
booking.createdAt
)
.toLocaleString();

}

}catch(error){

createdAt =
"Not available";

}

}


let statusClass =
"status-pending";


if(
booking.status ===
"Confirmed"
){

statusClass =
"status-confirmed";

}

if(
booking.status ===
"Completed"
){

statusClass =
"status-completed";

}

if(
booking.status ===
"Cancelled"
){

statusClass =
"status-cancelled";

}


card.innerHTML = `

<div class="booking-header">

<div>

<div class="booking-reference">

${escapeHtml(
booking.bookingReference ||
"No Reference"
)}

</div>

<div class="booking-date">

Submitted:
${escapeHtml(
createdAt
)}

</div>

<div class="status-badge ${statusClass}">

${escapeHtml(
booking.status ||
"Pending Verification"
)}

</div>

</div>

</div>


<div class="booking-grid">


<div class="info-box">

<strong>CLIENT</strong>

<span>

${escapeHtml(
booking.clientName ||
""
)}

</span>

</div>


<div class="info-box">

<strong>COMPANY</strong>

<span>

${escapeHtml(
booking.company ||
"N/A"
)}

</span>

</div>


<div class="info-box">

<strong>MOBILE</strong>

<span>

${escapeHtml(
booking.mobile ||
""
)}

</span>

</div>


<div class="info-box">

<strong>EMAIL</strong>

<span>

${escapeHtml(
booking.email ||
""
)}

</span>

</div>


<div class="info-box">

<strong>PROJECT LOCATION</strong>

<span>

${escapeHtml(
booking.location ||
""
)}

</span>

</div>


<div class="info-box">

<strong>PROJECT DATE</strong>

<span>

${escapeHtml(
booking.date ||
""
)}

</span>

</div>


<div class="info-box">

<strong>TIME</strong>

<span>

${escapeHtml(
booking.time ||
"Not specified"
)}

</span>

</div>


<div class="info-box">

<strong>DRONE</strong>

<span>

${escapeHtml(
booking.drone ||
"Recommend equipment"
)}

</span>

</div>


<div class="info-box">

<strong>PAYMENT METHOD</strong>

<span>

${escapeHtml(
booking.paymentMethod ||
""
)}

</span>

</div>


<div class="info-box">

<strong>DOWN PAYMENT</strong>

<span>

₱${Number(
booking.amountPaid ||
0
).toLocaleString()}

</span>

</div>


<div class="info-box">

<strong>TRANSACTION REFERENCE</strong>

<span>

${escapeHtml(
booking.transactionReference ||
"N/A"
)}

</span>

</div>


<div class="info-box">

<strong>DESCRIPTION</strong>

<span>

${escapeHtml(
booking.description ||
""
)}

</span>

</div>


</div>


<div class="services">

<strong>
SELECTED SERVICES
</strong>

${escapeHtml(
services
)}

</div>


<div class="status-area">

<strong>
Status:
</strong>


<select
id="status-${booking.id}"
>

<option
value="Pending Verification"
${booking.status === "Pending Verification" ? "selected" : ""}
>
Pending Verification
</option>


<option
value="Confirmed"
${booking.status === "Confirmed" ? "selected" : ""}
>
Confirmed
</option>


<option
value="Completed"
${booking.status === "Completed" ? "selected" : ""}
>
Completed
</option>


<option
value="Cancelled"
${booking.status === "Cancelled" ? "selected" : ""}
>
Cancelled
</option>

</select>


<button
class="update-btn"
onclick="updateStatus('${booking.id}')"
>

Update Status

</button>

</div>

`;


bookingsContainer.appendChild(
card
);

}

);

}



/*
========================================
UPDATE STATUS
========================================
*/

window.updateStatus =

async function(
bookingId
){

const select =

document.getElementById(
"status-" +
bookingId
);


const newStatus =
select.value;


const booking =

allBookings.find(

function(item){

return item.id ===
bookingId;

}

);


if(
!booking
){

alert(
"Booking not found."
);

return;

}


const oldStatus =
booking.status;


if(
oldStatus ===
newStatus
){

alert(
"Booking status is already " +
newStatus
);

return;

}


const confirmed =

confirm(

"Change booking status to " +

newStatus +

"?"

);


if(
!confirmed
){

return;

}


const buttons =

document.querySelectorAll(
".update-btn"
);


buttons.forEach(

function(button){

button.disabled =
true;

}

);


try{


/*
========================================
UPDATE FIREBASE STATUS
========================================
*/

await updateDoc(

doc(
db,
"bookings",
bookingId
),

{

status:
newStatus

}

);


/*
========================================
IF CONFIRMED
SEND CONFIRMATION EMAIL
========================================
*/

if(
newStatus ===
"Confirmed"
){

showNotification(

"Booking updated. Sending confirmation email to client..."

);


try{


const response =

await fetch(

APPS_SCRIPT_URL,

{

method:
"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

action:
"confirmBooking",

bookingReference:

booking.bookingReference,

clientName:

booking.clientName,

email:

booking.email,

company:

booking.company,

mobile:

booking.mobile,

location:

booking.location,

date:

booking.date,

time:

booking.time,

description:

booking.description,

services:

booking.services,

drone:

booking.drone,

paymentMethod:

booking.paymentMethod,

amountPaid:

booking.amountPaid,

transactionReference:

booking.transactionReference,

status:
"Confirmed"

})

}

);


const result =

await response.json();


if(
result.success
){

showNotification(

"Booking CONFIRMED successfully! Confirmation email sent to the client."

);

}else{

showNotification(

"Booking confirmed in dashboard, but email failed: " +

(result.error ||
"Unknown error"),

true

);

}

}catch(emailError){

console.error(
emailError
);

showNotification(

"Booking confirmed in dashboard, but confirmation email could not be sent.",

true

);

}

}else{


if(
newStatus ===
"Cancelled"
){

showNotification(

"Booking cancelled successfully."

);

}else if(
newStatus ===
"Completed"
){

showNotification(

"Booking marked as completed."

);

}else{

showNotification(

"Booking status updated successfully."

);

}

}


await loadBookings();


}catch(error){

console.error(
error
);

showNotification(

"Error updating booking: " +

error.message,

true

);

}finally{

buttons.forEach(

function(button){

button.disabled =
false;

}

);

}

};



/*
========================================
SEARCH
========================================
*/

searchInput.addEventListener(

"input",

function(){

displayBookings(
allBookings
);

}

);



/*
========================================
FILTER
========================================
*/

statusFilter.addEventListener(

"change",

function(){

displayBookings(
allBookings
);

}

);



/*
========================================
ESCAPE HTML
========================================
*/

function escapeHtml(
text
